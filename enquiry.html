<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Enquiry for Peng Football T-Shirts</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>Enquiry Form</h1>

    <!-- Message displayed here (important placement) -->
    <p id="formMessage"></p>

    <!-- Form starts here -->
    <form id="contact-form">

        <!-- First Name -->
        <div>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Enter name" required>
        </div>

        <br>

        <!-- Cell Number -->
        <div>
            <label for="cell">Cell Number:</label>
            <input type="tel" id="cell" name="cell" placeholder="+27 12 345 6789" required>
        </div>

        <br>

        <!-- Email -->
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <br>

        <!-- Address -->
        <div>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="Enter your address" required>
        </div>

        <br>

        <!-- Buttons -->
        <div>
            <input type="reset" value="Clear Form">
            <input type="submit" value="Submit">
        </div>

    </form>

    <br>

    <!-- Navigation menu -->
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="Products.html">Products</a></li>
        <li><a href="Enquiry.html">Enquiry</a></li>
        <li><a href="Contact.html">Contact</a></li>
    </ul>

    <script src="js/enquiry.js"></script>

</body>
</html>
