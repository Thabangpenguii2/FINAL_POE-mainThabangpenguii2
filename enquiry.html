<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <!-- Mobile friendly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO description -->
    <meta name="description" content="Send an enquiry to Peng Football T-Shirts. Contact us for custom football shirts, orders, and support in South Africa.">

    <title>Enquiry Form | Peng Football T-Shirts South Africa</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About Us</a></li>

            <li><a href="products.html">Products</a></li>

            <li><a href="enquiry.html">Enquiry</a></li>

            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Heading -->
    <h1>Enquiry Form</h1>

    <h2>Send us a Message</h2>

    <!-- Form -->
    <form id="contact-form">

        <!-- First Name -->
        <div>
            <label for="fname">First Name:</label>

            <input
                type="text"
                id="fname"
                name="fname"
                placeholder="Enter your name"
                required>
        </div>

        <br>

        <!-- Cell Number -->
        <div>
            <label for="cell">Cell Number:</label>

            <input
                type="tel"
                id="cell"
                name="cell"
                placeholder="0812345678"
                pattern="[0-9]{10}"
                maxlength="10"
                required>

            <small>
                Enter a 10-digit phone number.
            </small>
        </div>

        <br>

        <!-- Email -->
        <div>
            <label for="email">Email:</label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required>
        </div>

        <br>

        <!-- Address -->
        <div>
            <label for="address">Address:</label>

            <input
                type="text"
                id="address"
                name="address"
                placeholder="Enter your address"
                required>
        </div>

        <br>

        <!-- Message -->
        <p id="formMessage"></p>

        <!-- Buttons -->
        <input type="reset" value="Clear Form">

        <input type="submit" value="Submit">

    </form>

    <!-- JavaScript -->
    <script src="js/enquiry.js"></script>

    <script src="js/main.js"></script>

</body>

</html>
