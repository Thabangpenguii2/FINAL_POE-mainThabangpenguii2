<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->

<html lang="en">
<!-- Root element of the webpage with language set to English -->

<head>
    <!-- Contains metadata and page settings -->
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <title>Enquiry for Peng Football T-Shirts</title>
    <!-- Title displayed on the browser tab -->

    <link rel="stylesheet" href="css/style.css">
    <!-- Links the external CSS stylesheet -->
</head>

<body>
    <!-- Main content of the webpage -->

    <h1>Enquiry Form</h1>
    <!-- Main heading of the page -->

    <!-- Form starts here -->
    <form action="action_page.php" method="get">

        <!-- First Name field -->
        <div>
            <label for="fname">First Name:</label>
            <!-- Label connected to the input field -->

            <input type="text" id="fname" name="fname" 
                   placeholder="Enter name" required>
            <!-- Text input for user's first name -->
        </div>

        <br>

        <!-- Cell Number field -->
        <div>
            <label for="cell">Cell Number:</label>

            <input type="tel" id="cell" name="cell" 
                   placeholder="+27 12 345 6789" required>
            <!-- Telephone input for user's cell number -->
        </div>

        <br>

        <!-- Email field -->
        <div>
            <label for="email">Email:</label>

            <input type="email" id="email" name="email" 
                   placeholder="Enter your email" required>
            <!-- Email input field -->
        </div>

        <br>

        <!-- Address field -->
        <div>
            <label for="address">Address:</label>

            <input type="text" id="address" name="address" 
                   placeholder="Enter your address" required>
            <!-- Text input for user's address -->
        </div>

        <br>

        <!-- Form buttons -->
        <div>
            <input type="reset" value="Clear Form">
            <!-- Button to clear all form fields -->

            <input type="submit" value="Submit">
            <!-- Button to submit the form -->
        </div>

    </form>
    <!-- End of form -->

    <br>

        <!-- Link to Enquiry page -->

        <li><a href="Contact.html">Contact</a></li>
        <!-- Link to Contact page -->
    </ul>

</body>
</html>
