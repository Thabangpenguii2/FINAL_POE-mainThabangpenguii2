
<!DOCTYPE html>

<body>
    <!-- Main content of the webpage -->

    <h2>Send us a Message</h2>
    <!-- Heading for the contact form -->

    <!-- Contact form starts here -->
    <form action="#" method="post">

        <!-- First Name field -->
        <div>
            <label for="fname">First Name:</label>

            <input type="text" id="fname" name="fname" 
                   placeholder="Enter name" required>
            <!-- Input field for user's first name -->
        </div>

        <br>

        <!-- Cell Number field -->
        <div>
            <label for="cell">Cell Number:</label>

            <input type="tel" id="cell" name="cell" 
                   placeholder="+27 12 345 6789" required>
            <!-- Input field for user's phone number -->
        </div>

        <br>

        <!-- Email field -->
        <div>
            <label for="email">Email:</label>

            <input type="email" id="email" name="email" 
                   placeholder="Enter your Email" required>
            <!-- Input field for user's email -->
        </div>

        <br>

        <!-- Message text area -->
        <div>
            <label for="message">Enter your message:</label><br>

            <textarea id="message" name="message" rows="4" cols="50" 
            placeholder="Type your message here..."></textarea>
            <!-- Text area where users type their message -->
        </div>

        <br>

        <!-- Form buttons -->
        <input type="reset" value="Reset Form">
        <!-- Button to clear the form -->

        <input type="submit" value="Submit">
        <!-- Button to submit the form -->

    </form>
    <!-- End of form -->
